<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oncology Research Data Collector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0B0F14; --bg-sec: #111820; --card: #151F2E; --card-alt: #1C293A;
            --accent: #00E5C3; --accent-dim: rgba(0,229,195,0.1);
            --danger: #FF5757; --danger-dim: rgba(255,87,87,0.1);
            --warning: #FFB84D; --warning-dim: rgba(255,184,77,0.1);
            --text: #EEF2F6; --text-muted: #8B9BB4; --border: #2A3849;
            --radius: 12px;
            --font-head: 'Space Grotesk', sans-serif;
            --font-body: 'DM Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        
        /* Typography */
        h1,h2,h3,h4 { font-family: var(--font-head); letter-spacing: -0.02em; }
        .text-sm { font-size: 0.85rem; }
        .text-xs { font-size: 0.75rem; }
        .text-muted { color: var(--text-muted); }
        .text-accent { color: var(--accent); }

        /* Layout */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
        .hidden { display: none !important; }

        /* Background */
        .bg-mesh { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; background: radial-gradient(circle at 15% 50%, rgba(0,229,195,0.08), transparent 25%), radial-gradient(circle at 85% 30%, rgba(59,130,246,0.08), transparent 25%); }

        /* Components */
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-family: var(--font-body); }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: #000; } .btn-primary:hover { box-shadow: 0 0 20px var(--accent-dim); }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); } .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }
        .btn-danger { background: var(--danger-dim); color: var(--danger); } .btn-danger:hover { background: var(--danger); color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.2); }

        /* Forms */
        .form-group { margin-bottom: 16px; position: relative; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
        .form-control { width: 100%; background: var(--bg-sec); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 14px; font-family: var(--font-body); transition: border 0.2s; }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
        .form-control[readonly] { background: rgba(255,255,255,0.03); color: var(--text-muted); cursor: not-allowed; }
        
        /* Datalist/Search Input Styling */
        input[list]::-webkit-calendar-picker-indicator { display: none; } /* Hide calendar icon on search inputs */

        /* Specific "Other" Field Styling */
        .other-input-wrapper { margin-top: 8px; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid Systems */
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

        /* Sections */
        .section-header { display: flex; align-items: center; justify-content: space-between; margin: 32px 0 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .section-header h3 { font-size: 18px; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .section-header i { color: var(--accent); }

        /* Dynamic Blocks */
        .dynamic-block { background: var(--card-alt); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; position: relative; transition: all 0.3s; }
        .dynamic-block:hover { border-color: var(--border-hover); }
        .block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .block-title { font-weight: 700; color: var(--accent); font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-remove { background: rgba(255,87,87,0.1); color: var(--danger); border: none; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .btn-remove:hover { background: var(--danger); color: white; }

        /* Tables */
        .table-container { overflow-x: auto; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; padding: 14px 20px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); border-bottom: 1px solid var(--border); background: var(--bg-sec); }
        td { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        /* Badges */
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .badge-success { background: var(--accent-dim); color: var(--accent); }
        .badge-danger { background: var(--danger-dim); color: var(--danger); }

        /* Header */
        header { background: rgba(11,15,20,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
        .nav-wrapper { display: flex; justify-content: space-between; align-items: center; height: 70px; }
        .logo { display: flex; align-items: center; gap: 12px; font-family: var(--font-head); font-weight: 700; font-size: 18px; }
        .logo i { color: var(--accent); font-size: 20px; }
        .user-pill { background: var(--card-alt); padding: 6px 12px; border-radius: 30px; border: 1px solid var(--border); font-size: 13px; display: flex; align-items: center; gap: 8px; }

        /* Login */
        #login-view { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 100; position: relative; }
        .login-box { width: 100%; max-width: 400px; padding: 40px; text-align: center; }

        /* Toast */
        #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--card); border-left: 4px solid var(--accent); padding: 16px 20px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 12px; min-width: 300px; animation: toastIn 0.3s; }
        .toast.error { border-left-color: var(--danger); }
        @keyframes toastIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

        /* Responsive */
        @media (max-width: 1024px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } .nav-wrapper { flex-direction: column; height: auto; padding: 16px 0; gap: 16px; } }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    <div id="toast-container"></div>

    <!-- Login View -->
    <div id="login-view">
        <div class="login-box card">
            <div style="width: 60px; height: 60px; background: var(--accent-dim); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; color: var(--accent); font-size: 24px;">
                <i class="fas fa-dna"></i>
            </div>
            <h2 style="margin-bottom: 8px;">Research Portal</h2>
            <p class="text-muted" style="margin-bottom: 32px;">Oncology & Antibiotic Studies</p>
            <form id="login-form">
                <div class="form-group">
                    <input type="text" id="username" class="form-control" placeholder="Username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <input type="password" id="password" class="form-control" placeholder="Password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                    <i class="fas fa-sign-in-alt"></i> Enter Portal
                </button>
            </form>
        </div>
    </div>

    <!-- App View -->
    <div id="app-view" class="hidden">
        <header>
            <div class="container nav-wrapper">
                <div class="logo">
                    <i class="fas fa-dna"></i>
                    <span>OncoCollect DB</span>
                </div>
                <div class="user-pill">
                    <span id="user-avatar" style="width: 24px; height: 24px; background: var(--accent); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px;">A</span>
                    <span id="user-name">Admin</span>
                    <button class="btn btn-ghost btn-sm" onclick="app.logout()"><i class="fas fa-power-off"></i></button>
                </div>
            </div>
        </header>

        <main class="container" style="padding-top: 32px;">
            <!-- Dashboard Panel -->
            <section id="dashboard-panel">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 16px;">
                        <h3 style="font-size: 20px;">Study Records</h3>
                        <button class="btn btn-primary btn-sm" onclick="app.showForm()"><i class="fas fa-plus"></i> New Entry</button>
                    </div>
                    <div class="table-container">
                        <table id="data-table">
                            <thead><tr><th>Study ID</th><th>Age</th><th>Diagnosis</th><th>Outcome</th></tr></thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- Form Panel -->
            <section id="form-panel" class="hidden">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                        <h2><i class="fas fa-file-medical text-accent"></i> New Study Entry</h2>
                        <button class="btn btn-ghost btn-sm" onclick="app.showDashboard()">Cancel</button>
                    </div>
                    <form id="research-form">
                        <!-- Basic Info -->
                        <div class="section-header"><h3><i class="fas fa-user"></i> Demographics</h3></div>
                        <div class="grid-4">
                            <div class="form-group"><label>Study ID</label><input type="text" id="A1" name="Study_ID" class="form-control" readonly></div>
                            <div class="form-group"><label>Age</label><input type="number" id="A2" name="Age" class="form-control" required></div>
                            <div class="form-group"><label>Sex</label><select id="A3" name="Sex" class="form-control"><option>Male</option><option>Female</option></select></div>
                            <div class="form-group"><label>Outcome</label><select id="B6" name="Outcome" class="form-control"><option>Discharged</option><option>Died</option></select></div>
                        </div>

                        <!-- Dynamic Antibiotics (Searchable from Sheet) -->
                        <div class="section-header">
                            <h3><i class="fas fa-capsules"></i> Antibiotic Episodes</h3>
                            <button type="button" class="btn btn-primary btn-sm" onclick="app.addAntibioticBlock()"><i class="fas fa-plus"></i> Add</button>
                        </div>
                        <div id="antibiotic-container"></div>

                        <!-- Dynamic Cultures (XDR) -->
                        <div class="section-header">
                            <h3><i class="fas fa-flask"></i> Microbiology Cultures</h3>
                            <button type="button" class="btn btn-primary btn-sm" onclick="app.addCultureBlock()"><i class="fas fa-plus"></i> Add</button>
                        </div>
                        <div id="culture-container"></div>

                        <div style="margin-top: 40px; text-align: right;">
                            <button type="button" class="btn btn-ghost" onclick="app.showDashboard()">Cancel</button>
                            <button type="submit" class="btn btn-primary" style="padding: 12px 32px;"><i class="fas fa-save"></i> Save Record</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    <script>
        // === Configuration ===
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwQc2dXEAKzT_n32JPtuLff__6Xo3rffL5WQObCnFSas9opkiWbzRu2SnEbqjRehCN8Bw/exec'; 

        class ResearchApp {
            constructor() {
                this.user = null;
                this.data = [];
                this.abxCount = 0;
                this.cultCount = 0;
                this.whoDatabase = []; // Will hold {name, class, category}
                this.whoMap = {}; // Fast lookup map
                this.init();
            }

            init() {
                document.getElementById('login-form').addEventListener('submit', (e) => this.handleLogin(e));
                document.getElementById('research-form').addEventListener('submit', (e) => this.handleSave(e));
            }

            /* --- Authentication --- */
            handleLogin(e) {
                e.preventDefault();
                const u = document.getElementById('username').value;
                const p = document.getElementById('password').value;
                const btn = e.target.querySelector('button');
                const orig = btn.innerHTML;
                
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                btn.disabled = true;

                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', username: u, password: p })
                })
                .then(r => r.json())
                .then(res => {
                    if (res.success) {
                        this.user = res.user;
                        this.showApp();
                        this.loadWhoData(); // Load searchable list
                        this.loadData();
                    } else {
                        this.toast(res.message, 'error');
                    }
                })
                .catch(err => this.toast('Connection error', 'error'))
                .finally(() => {
                    btn.innerHTML = orig;
                    btn.disabled = false;
                });
            }

            /* --- Load WHO Data from Sheet --- */
            loadWhoData() {
                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getAntibiotics' })
                })
                .then(r => r.json())
                .then(list => {
                    this.whoDatabase = list;
                    // Create a lookup map: Key=Name, Value={class, category}
                    this.whoMap = {};
                    list.forEach(item => {
                        this.whoMap[item.name] = item;
                    });
                    console.log("WHO Data Loaded:", list.length, "drugs");
                })
                .catch(e => console.error("Failed to load WHO list", e));
            }

            /* --- Navigation --- */
            showApp() {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('app-view').classList.remove('hidden');
                document.getElementById('user-name').textContent = this.user.username;
                document.getElementById('user-avatar').textContent = this.user.username.charAt(0).toUpperCase();
            }
            showDashboard() {
                document.getElementById('form-panel').classList.add('hidden');
                document.getElementById('dashboard-panel').classList.remove('hidden');
            }
            showForm() {
                document.getElementById('dashboard-panel').classList.add('hidden');
                document.getElementById('form-panel').classList.remove('hidden');
                this.resetForm();
            }
            resetForm() {
                document.getElementById('research-form').reset();
                document.getElementById('A1').value = 'PID-' + Math.floor(100000 + Math.random() * 900000);
                document.getElementById('antibiotic-container').innerHTML = '';
                document.getElementById('culture-container').innerHTML = '';
                this.abxCount = 0;
                this.cultCount = 0;
            }
            logout() {
                location.reload();
            }

            /* --- Data Handling --- */
            loadData() {
                fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read' }) })
                .then(r => r.json())
                .then(res => {
                    this.data = res || [];
                    this.renderTable();
                })
                .catch(e => console.error(e));
            }

            handleSave(e) {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                const orig = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                btn.disabled = true;

                const formData = new FormData(e.target);
                const payload = { action: 'save', user: this.user.username, data: {} };

                // 1. Process Static Fields
                formData.forEach((value, key) => { payload.data[key] = value; });

                // 2. Process Dynamic Antibiotics
                const abxBlocks = document.querySelectorAll('#antibiotic-container .dynamic-block');
                abxBlocks.forEach((block, index) => {
                    const i = index + 1;
                    const getVal = (sel) => block.querySelector(sel)?.value || '';
                    
                    payload.data[`Abx_${i}_Name`] = getVal('input[name*="Name"]');
                    payload.data[`Abx_${i}_Class`] = getVal('input[name*="Class"]');
                    payload.data[`Abx_${i}_Category`] = getVal('input[name*="Category"]');
                    payload.data[`Abx_${i}_Route`] = getVal('select[name*="Route"]');
                    payload.data[`Abx_${i}_Dose`] = getVal('input[name*="Dose"]');
                });

                // 3. Process Dynamic Cultures
                const cultBlocks = document.querySelectorAll('#culture-container .dynamic-block');
                cultBlocks.forEach((block, index) => {
                    const i = index + 1;
                    const getVal = (sel) => block.querySelector(sel)?.value || '';
                    
                    payload.data[`Cult_${i}_Type`] = getVal('select[name*="Type"]');
                    payload.data[`Cult_${i}_Result`] = getVal('select[name*="Result"]');
                    payload.data[`Cult_${i}_XDR`] = getVal('select[name*="XDR"]');
                    payload.data[`Cult_${i}_XDR_Details`] = getVal('input[name*="XDR_Details"]');
                });

                fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
                .then(r => r.json())
                .then(res => {
                    if(res.success) {
                        this.toast('Saved successfully', 'success');
                        this.showDashboard();
                        this.loadData();
                    } else {
                        this.toast(res.message, 'error');
                    }
                })
                .finally(() => { btn.innerHTML = orig; btn.disabled = false; });
            }

            renderTable() {
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';
                if(this.data.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No records</td></tr>'; return; }
                
                this.data.slice().reverse().forEach(r => {
                    tbody.innerHTML += `
                        <tr>
                            <td><span class="text-accent">${r.Study_ID}</span></td>
                            <td>${r.Age}</td>
                            <td>${r.A1_Diagnosis || ''}</td>
                            <td>${r.Outcome}</td>
                        </tr>`;
                });
            }

            /* --- Dynamic Builders --- */

            // Adds a Searchable Antibiotic Block
            addAntibioticBlock() {
                this.abxCount++;
                const id = this.abxCount;
                
                // Generate Datalist Options dynamically from the loaded WHO list
                let datalistOptions = this.whoDatabase.map(d => `<option value="${d.name}">`).join('');
                
                const html = `
                    <div class="dynamic-block">
                        <div class="block-header">
                            <span class="block-title">Antibiotic #${id}</span>
                            <button type="button" class="btn-remove" onclick="this.closest('.dynamic-block').remove()"><i class="fas fa-times"></i></button>
                        </div>
                        <div class="grid-3">
                            <div class="form-group">
                                <label>Antibiotic Name (Type to Search)</label>
                                <!-- Input list allows typing AND selecting -->
                                <input type="text" list="abx-list-${id}" name="Abx_Name_${id}" class="form-control" placeholder="Search or type..." oninput="app.handleAbxInput(this, ${id})">
                                <datalist id="abx-list-${id}">
                                    ${datalistOptions}
                                </datalist>
                            </div>
                            <div class="form-group">
                                <label>Class</label>
                                <input type="text" name="Abx_Class_${id}" class="form-control" readonly>
                            </div>
                            <div class="form-group">
                                <label>Category (AWaRe)</label>
                                <input type="text" name="Abx_Category_${id}" class="form-control" readonly>
                            </div>
                            <div class="form-group">
                                <label>Route</label>
                                <select name="Abx_Route_${id}" class="form-control">
                                    <option>IV</option><option>Oral</option><option>Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Dose</label>
                                <input type="text" name="Abx_Dose_${id}" class="form-control">
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('antibiotic-container').insertAdjacentHTML('beforeend', html);
            }

            // Logic to check input against WHO Map
            handleAbxInput(input, id) {
                const block = input.closest('.dynamic-block');
                const val = input.value.trim();
                const classInput = block.querySelector('input[name*="Class"]');
                const catInput = block.querySelector('input[name*="Category"]');

                // Check if the value exists in our WHO Map
                const match = this.whoMap[val];

                if (match) {
                    // Perfect Match found from Sheet -> Auto-fill
                    classInput.value = match.class;
                    catInput.value = match.category;
                    classInput.style.borderColor = "var(--accent)";
                } else {
                    // Not found (User typed "Other" or custom name)
                    // Do not clear immediately to allow typing, but reset visual cues
                    classInput.style.borderColor = "var(--border)";
                    if (val === "") {
                        classInput.value = "";
                        catInput.value = "";
                    } else if (!classInput.value) {
                        // If they are typing and we haven't set a match yet, leave it blank or clear previous
                        classInput.value = "";
                        catInput.value = "";
                    }
                }
            }

            addCultureBlock() {
                this.cultCount++;
                const id = this.cultCount;
                const html = `
                    <div class="dynamic-block">
                        <div class="block-header">
                            <span class="block-title">Culture #${id}</span>
                            <button type="button" class="btn-remove" onclick="this.closest('.dynamic-block').remove()"><i class="fas fa-times"></i></button>
                        </div>
                        <div class="grid-3">
                            <div class="form-group">
                                <label>Type</label>
                                <select name="Cult_Type_${id}" class="form-control">
                                    <option>Blood</option><option>Urine</option><option>Sputum</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Result</label>
                                <select name="Cult_Result_${id}" class="form-control">
                                    <option>Positive</option><option>Negative</option>
                                </select>
                            </div>
                            <!-- XDR Logic -->
                            <div class="form-group">
                                <label>D10. XDR Criteria Met?</label>
                                <select name="Cult_XDR_${id}" class="form-control" onchange="app.toggleXDR(this, ${id})">
                                    <option value="No">No</option>
                                    <option value="Yes">Yes</option>
                                </select>
                            </div>
                            <div class="form-group hidden" id="xdr-details-${id}" style="grid-column: span 3;">
                                <label class="text-accent">XDR Details</label>
                                <input type="text" name="Cult_XDR_Details_${id}" class="form-control" placeholder="Enter specific resistance details...">
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('culture-container').insertAdjacentHTML('beforeend', html);
            }

            toggleXDR(select, id) {
                const detailsDiv = document.getElementById(`xdr-details-${id}`);
                if(select.value === 'Yes') {
                    detailsDiv.classList.remove('hidden');
                    detailsDiv.querySelector('input').required = true;
                } else {
                    detailsDiv.classList.add('hidden');
                    detailsDiv.querySelector('input').required = false;
                    detailsDiv.querySelector('input').value = '';
                }
            }

            toast(msg, type='success') {
                const div = document.createElement('div');
                div.className = `toast ${type}`;
                div.innerHTML = `<i class="fas fa-${type === 'success' ? 'check' : 'exclamation'}-circle"></i> ${msg}`;
                document.getElementById('toast-container').appendChild(div);
                setTimeout(() => div.remove(), 3000);
            }
        }

        const app = new ResearchApp();
    </script>
</body>
</html>
